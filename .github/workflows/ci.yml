name: ci - php

on: 
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: setup php
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4.16'

      - name: check syntax
        run: |
          find . -type f -name "*.php" -exec php -l {} \;
      
          
